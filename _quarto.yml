project:
  type: website
  output-dir: _site

website:
  title: "Mathematical Finance of Alternative Assets"
  description: "Graduate course companion: illiquidity, incomplete markets, and stochastic valuation"
  navbar:
    right:
      - text: "Open the Laboratory →"
        href: "https://mathematicalfinance.app"
  sidebar:
    style: docked
    search: true
    contents:
      - index.qmd
      - section: "Course Foundations"
        contents: [syllabus.qmd, schedule.qmd, slides.qmd, labs.qmd]
      - section: "Chapters"
        contents:
          - chapters/ch01.qmd
          - chapters/ch02.qmd
          - chapters/ch03.qmd
          - chapters/ch04.qmd
          - chapters/ch05.qmd
          - chapters/ch06.qmd
          - chapters/ch07.qmd
          - chapters/ch08.qmd
          - chapters/ch09.qmd
          - chapters/ch10.qmd
          - chapters/ch11.qmd
          - chapters/ch12.qmd
          - chapters/ch13.qmd
          - chapters/ch14.qmd
          - chapters/ch15.qmd
          - chapters/ch16.qmd
          - chapters/ch17.qmd
  page-footer:
    background: light
    left: "© 2026 Samir Asaf · *Mathematical Finance of Alternative Assets*"
    center: "Illiquidity · Incomplete Markets · Stochastic Valuation"
    right:
      - text: "Laboratory"
        href: "https://mathematicalfinance.app"
      - text: "Syllabus"
        href: "syllabus.qmd"
      - text: "Labs & Downloads"
        href: "labs.qmd"

format:
  html:
    theme: [cosmo, theme.scss]
    css: styles.css
    toc: true
    number-sections: false
    grid:
      body-width: 950px
